services:
  redis:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: my-redis-server
    ports:
      - "6379:6379"
    environment:
      - REDIS_PORT=6379
      - REDIS_PASSWORD=admin-password
    restart: always

  redis-commander:
    image: rediscommander/redis-commander:latest
    container_name: redis-commander
    environment:
      - REDIS_HOSTS=local:redis:6379:0:admin-password
    ports:
      - "8081:8081"
    depends_on:
      - redis
    restart: always
